version: '3.8'
services:
  shop_api:
    build:
      context: .
    ports:
      - "8001:8000"
    command: sh -c "python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - shop_data

  shop_data:
    image: postgres:14
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - data:/var/lib/postgresql/data

volumes:
  data: